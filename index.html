<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Projeto Frutiger - V 1.5.4</title>
    
    <link rel="icon" href="https://img.icons8.com/emoji/48/leaf-fluttering-in-wind.png" type="image/png">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; width: 100vw; display: flex;
            background: #121212; overflow: hidden; color: #333;
            user-select: none;
        }

        /* FUNDO FRUTIGER ATUALIZADO - V 1.5.4 */
        body.frutiger-mode {
            background-color: #4facfe !important;
            background-image: 
                linear-gradient(135deg, rgba(79, 172, 254, 0.2) 0%, rgba(0, 242, 254, 0.2) 100%), 
                url('https://drive.google.com/uc?export=view&id=107Y1IIA7qieLaIQEYSbGw6bg0UvI1nmr') !important; 
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-attachment: fixed !important;
            background-size: cover !important; 
            color: #fff !important;
        }

        body.dark-mode { background: #121212 !important; color: #ffffff !important; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; height: 100vh; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; z-index: 20; background: #fff; border-right: 1px solid #ddd; }
        body.dark-mode .sidebar { background: #1e1e1e; border-right: 1px solid #333; }
        body.frutiger-mode .sidebar { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-right: solid 1px rgba(255,255,255,0.1); }

        .menu-parent { 
            padding: 12px; border-radius: 10px; background: rgba(76, 175, 80, 0.1); 
            font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(76, 175, 80, 0.3); color: #4caf50;
        }
        .submenu { max-height: 0; overflow: hidden; padding-left: 15px; transition: max-height 0.5s ease; }
        .submenu.active { max-height: 500px; }

        .sidebar-item { padding: 10px 15px; margin-top: 5px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; opacity: 0.7; }
        .sidebar-item.active { opacity: 1; color: #4caf50; font-weight: bold; border-left: 2px solid #4caf50; }

        /* LOG DE ALTERAÇÕES */
        .log-container { 
            margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 12px; 
            height: 150px; overflow-y: auto; font-size: 0.72rem; color: #ffffff;
            border: 1px solid rgba(255,255,255,0.1); text-align: left;
        }
        .log-title { font-weight: bold; margin-bottom: 8px; color: #4caf50; display: block; }

        /* DATA TOTALMENTE LIMPA */
        input[type="date"]::-webkit-datetime-edit { color: transparent; }
        input[type="date"]:focus::-webkit-datetime-edit,
        input[type="date"]:valid::-webkit-datetime-edit { color: #fff !important; }

        input { padding: 10px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; text-transform: uppercase; }

        /* TABELA E CORES */
        .txt-ok { color: #4caf50 !important; font-weight: bold; }
        .txt-atrasado { color: #ff5252 !important; font-weight: bold; }

        tbody tr { background: #000 !important; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        td { padding: 15px; color: #fff; border: none; font-size: 0.85rem; }
        td:first-child { border-radius: 15px 0 0 15px; }
        td:last-child { border-radius: 0 15px 15px 0; }
        
        .main-content { flex-grow: 1; height: 100vh; overflow-y: auto; padding: 30px 20px; display: flex; justify-content: center; }
        .glass-container { width: 100%; max-width: 1250px; border-radius: 20px; padding: 30px; background: rgba(30,30,30,0.9); height: fit-content; }
        
        /* BOLHAS FRUTIGER */
        .bubble { position: absolute; background: rgba(255, 255, 255, 0.25); border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; animation: float linear infinite; z-index: 1; }
        @keyframes float { 
            from { transform: translateY(0) translateX(0); opacity: 0.6; } 
            to { transform: translateY(-110vh) translateX(20px); opacity: 0; } 
        }
    </style>
</head>
<body class="dark-mode">

<div id="bubbles-container"></div>

<div class="sidebar">
    <h3 onclick="toggleFrutiger()" style="cursor:pointer">Frutiger Eco</h3>
    <div style="text-align: center; margin-bottom: 20px;">
        <button id="themeBtn" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:inherit;" onclick="toggleTheme()">☾</button>
    </div>

    <div class="menu-parent" onclick="toggleSubmenu()">
        Controle O.S. <span id="arrow">▼</span>
    </div>
    
    <div id="osSubmenu" class="submenu active">
        <div class="sidebar-item active" onclick="navegar(this, 'Pedidos de Peça')">Pedidos de Peça</div>
        <div class="sidebar-item" onclick="navegar(this, 'Montados')">Montados</div>
        <div class="sidebar-item" onclick="navegar(this, 'Aprovados')">Aprovados</div>
        <div class="sidebar-item" onclick="navegar(this, 'Analisados')">Analisados</div>
        <div class="sidebar-item" onclick="navegar(this, 'Erros de Apontamento')">Erros de Apontamento</div>
    </div>

    <div class="log-container">
        <span class="log-title">HISTÓRICO</span>
        <div style="margin-bottom:4px;"><b>V 1.5.4</b>: Nova Imagem + Mais Bolhas + Data Limpa.</div>
        <div style="margin-bottom:4px;"><b>V 1.5.3</b>: Cores e Log restaurados.</div>
        <div style="margin-bottom:4px;"><b>V 1.5.2</b>: Menu Controle O.S.</div>
    </div>

    <div style="margin-top: auto; text-align: center; opacity: 0.3; font-size: 0.7rem;">V 1.5.4</div>
</div>

<div class="main-content">
    <div class="glass-container">
        <h2 style="margin-top:0">Frutiger Project Cloud</h2>
        <div id="subtituloAba" style="font-weight: bold; color: #4caf50; margin-bottom: 20px;">Pedidos de Peça</div>
        
        <div style="display:flex; gap:10px; margin-bottom:30px; justify-content:center; flex-wrap:wrap;">
            <div id="formInputs" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
            <button onclick="adicionar()" style="background:#4caf50; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">ADICIONAR</button>
            <input type="text" id="filtroGeral" placeholder="⌕ FILTRAR..." onkeyup="filtrarGeral()">
        </div>

        <table style="width:100%; border-collapse:separate; border-spacing:0 12px;">
            <thead id="cabecalhoTabela"></thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AiZaSyA4AFbehMGUY0D0-j5hIjLcalhirQYLCN4",
        authDomain: "projeto-frutiger.firebaseapp.com",
        projectId: "projeto-frutiger",
        storageBucket: "projeto-frutiger.firebasestorage.app",
        messagingSenderId: "574572027554",
        appId: "1:574572027554:web:7946825d87e03781f401fb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let abaAtual = 'Pedidos de Peça';
    const configAbas = {
        'Pedidos de Peça': ['DATA', 'CLIENTE', 'O.S.', 'STATUS'],
        'Montados': ['O.S.', 'DATA', 'CLIENTE', 'MONTADOR', 'ENTREGA INTERNA', 'STATUS'],
        'Aprovados': ['DATA', 'CLIENTE', 'O.S.', 'STATUS'],
        'Analisados': ['DATA', 'O.S.', 'CLIENTE', 'ORÇAMENTISTA'],
        'Erros de Apontamento': ['O.S.', 'ERRO', 'QUEM CAUSOU', 'DATA']
    };

    function toggleSubmenu() {
        const sub = document.getElementById('osSubmenu');
        sub.classList.toggle('active');
        document.getElementById('arrow').innerText = sub.classList.contains('active') ? '▲' : '▼';
    }

    function navegar(elemento, nomeAba) {
        abaAtual = nomeAba;
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        elemento.classList.add('active');
        document.getElementById('subtituloAba').innerText = nomeAba;
        renderizarInterface();
    }

    function formatarDataBR(dataStr) {
        if(!dataStr || !dataStr.includes('-')) return dataStr;
        const [ano, mes, dia] = dataStr.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    function renderizarInterface() {
        const form = document.getElementById('formInputs');
        const head = document.getElementById('cabecalhoTabela');
        form.innerHTML = ''; head.innerHTML = '';
        
        configAbas[abaAtual].forEach(col => {
            if(abaAtual === 'Montados' && col === 'STATUS') return;
            let input = document.createElement('input');
            input.type = (col.includes('DATA') || col.includes('ENTREGA')) ? 'date' : 'text';
            input.id = `in-${col}`;
            input.placeholder = col;
            form.appendChild(input);
            
            let th = document.createElement('th');
            th.innerText = col;
            th.style.color = "#888"; th.style.fontSize = "0.7rem"; th.style.textAlign = "left"; th.style.paddingLeft = "15px";
            head.appendChild(th);
        });
        head.innerHTML += '<th></th>';
        ouvirDadosNuvem();
    }

    function ouvirDadosNuvem() {
        db.collection(abaAtual).orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = '';
            snapshot.forEach(doc => {
                const item = doc.data();
                let tr = document.createElement('tr');
                configAbas[abaAtual].forEach(col => {
                    let td = document.createElement('td');
                    let valor = item[col] || '-';
                    td.innerText = (col.includes('DATA') || col.includes('ENTREGA')) ? formatarDataBR(valor) : valor;
                    
                    if(td.innerText === 'OK') td.className = 'txt-ok';
                    if(td.innerText === 'ATRASADO') td.className = 'txt-atrasado';
                    
                    tr.appendChild(td);
                });
                let tdAcao = document.createElement('td');
                tdAcao.innerHTML = `<button onclick="deletar('${doc.id}')" style="background:none; border:1px solid #ff5252; color:#ff5252; border-radius:4px; cursor:pointer">X</button>`;
                tr.appendChild(tdAcao);
                tbody.appendChild(tr);
            });
        });
    }

    async function adicionar() {
        let novoItem = { timestamp: firebase.firestore.FieldValue.serverTimestamp() };
        configAbas[abaAtual].forEach(col => {
            if(col === 'STATUS' && abaAtual === 'Montados') return;
            const el = document.getElementById(`in-${col}`);
            novoItem[col] = el.value.toUpperCase();
        });
        if(abaAtual === 'Montados') {
            const dt = document.getElementById('in-DATA').value;
            const ent = document.getElementById('in-ENTREGA INTERNA').value;
            novoItem['STATUS'] = (dt > ent) ? 'ATRASADO' : 'OK';
        }
        await db.collection(abaAtual).add(novoItem);
        renderizarInterface();
    }

    async function deletar(id) { if(confirm("EXCLUIR?")) await db.collection(abaAtual).doc(id).delete(); }

    function toggleTheme() { document.body.classList.toggle('light-mode'); document.body.classList.toggle('dark-mode'); }
    
    function toggleFrutiger() { 
        document.body.classList.toggle('frutiger-mode');
        if(document.body.classList.contains('frutiger-mode')) {
            // Aumentei a frequência das bolhas
            window.bubbleInterval = setInterval(() => {
                const b = document.createElement('div'); b.className = 'bubble';
                const s = Math.random() * 30 + 10 + 'px'; 
                b.style.width = s; b.style.height = s;
                b.style.left = Math.random() * 100 + 'vw'; b.style.bottom = "-50px";
                b.style.animationDuration = Math.random() * 4 + 3 + 's';
                document.getElementById('bubbles-container').appendChild(b);
                setTimeout(() => b.remove(), 7000);
            }, 600); // Antes era 2000, agora cria bolhas muito mais rápido
        } else {
            clearInterval(window.bubbleInterval);
        }
    }

    function filtrarGeral() {
        const busca = document.getElementById('filtroGeral').value.toLowerCase();
        document.querySelectorAll('#corpoTabela tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(busca) ? '' : 'none';
        });
    }

    renderizarInterface();
</script>
</body>
</html>
