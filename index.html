<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Projeto Frutiger - V 1.5.2</title>
    
    <link rel="icon" href="https://img.icons8.com/emoji/48/leaf-fluttering-in-wind.png" type="image/png">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; width: 100vw; display: flex;
            background: #121212; overflow: hidden; color: #333;
            user-select: none;
        }

        /* FUNDO FRUTIGER */
        body.frutiger-mode {
            background-color: #4facfe !important;
            background-image: 
                linear-gradient(135deg, rgba(79, 172, 254, 0.2) 0%, rgba(0, 242, 254, 0.2) 100%), 
                url('https://drive.google.com/uc?export=view&id=1XzI6_Y9_Y_Y_Y_Y_Y_Y_Y_Y_Y_Y_Y_Y') !important; 
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-attachment: fixed !important;
            background-size: cover !important; 
            color: #fff !important;
        }

        body.dark-mode { background: #121212 !important; color: #ffffff !important; }
        
        /* SIDEBAR ESTILIZADA */
        .sidebar { width: 260px; height: 100vh; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; z-index: 20; background: #fff; border-right: 1px solid #ddd; }
        body.dark-mode .sidebar { background: #1e1e1e; border-right: 1px solid #333; }
        body.frutiger-mode .sidebar { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-right: solid 1px rgba(255,255,255,0.1); }

        .sidebar h3 { margin-bottom: 20px; text-align: center; font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

        /* DROPDOWN MENU */
        .menu-parent { 
            padding: 12px; border-radius: 10px; background: rgba(76, 175, 80, 0.1); 
            font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(76, 175, 80, 0.3); color: #4caf50;
        }
        .submenu { 
            max-height: 0; overflow: hidden; padding-left: 15px; 
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
        }
        .submenu.active { max-height: 500px; transition: max-height 0.5s ease-in; }

        .sidebar-item { 
            padding: 10px 15px; margin-top: 5px; border-radius: 8px; font-size: 0.85rem; 
            cursor: pointer; opacity: 0.7; border-left: 2px solid transparent;
        }
        .sidebar-item:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .sidebar-item.active { opacity: 1; color: #4caf50; border-left: 2px solid #4caf50; font-weight: bold; }

        /* INPUTS DE DATA LIMPOS */
        input[type="date"] {
            position: relative;
            min-width: 140px;
        }
        /* Esconde o texto padrão do browser e deixa só o esqueleto */
        input[type="date"]::-webkit-datetime-edit-text, 
        input[type="date"]::-webkit-datetime-edit-month-field, 
        input[type="date"]::-webkit-datetime-edit-day-field, 
        input[type="date"]::-webkit-datetime-edit-year-field {
            color: #999;
        }
        body.dark-mode input, body.frutiger-mode input { background: #2a2a2a; border: 1px solid #444; color: #fff; }

        /* GLASS CONTAINER E TABELA */
        .main-content { flex-grow: 1; height: 100vh; overflow-y: auto; display: flex; justify-content: center; padding: 30px 20px; }
        .glass-container { width: 100%; max-width: 1250px; border-radius: 20px; padding: 30px; z-index: 10; background: #fff; border: 1px solid #ddd; height: fit-content; }
        body.dark-mode .glass-container { background: #1e1e1e; border: 1px solid #333; }
        body.frutiger-mode .glass-container { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.2); }

        tbody tr { background: #000 !important; border-radius: 15px; }
        td { padding: 18px 15px; color: #fff; border: none; font-size: 0.88rem; }
        td:first-child { border-radius: 15px 0 0 15px; }
        td:last-child { border-radius: 0 15px 15px 0; }
        
        .add-btn { background: #4caf50; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .version-footer { margin-top: auto; text-align: center; opacity: 0.3; font-size: 0.7rem; }
        
        .bubble { position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 50%; pointer-events: none; animation: float linear infinite; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-110vh); } }
    </style>
</head>
<body class="dark-mode">

<div id="bubbles-container"></div>

<div class="sidebar">
    <h3 id="sidebarTitle">Frutiger Eco</h3>
    <div style="text-align: center; margin-bottom: 20px;">
        <button id="themeBtn" style="background:none; border:none; font-size:2rem; cursor:pointer; color:inherit;" onclick="toggleTheme()">☾</button>
    </div>

    <div class="menu-parent" onclick="toggleSubmenu()">
        Controle O.S. <span id="arrow">▼</span>
    </div>
    
    <div id="osSubmenu" class="submenu">
        <div class="sidebar-item active" onclick="navegar(this, 'Pedidos de Peça')">Pedidos de Peça</div>
        <div class="sidebar-item" onclick="navegar(this, 'Montados')">Montados</div>
        <div class="sidebar-item" onclick="navegar(this, 'Aprovados')">Aprovados</div>
        <div class="sidebar-item" onclick="navegar(this, 'Analisados')">Analisados</div>
        <div class="sidebar-item" onclick="navegar(this, 'Erros de Apontamento')">Erros de Apontamento</div>
    </div>

    <div class="version-footer">V 1.5.2</div>
</div>

<div class="main-content">
    <div class="glass-container">
        <h2 id="mainTitle" style="cursor:pointer;" onclick="toggleFrutiger()">Frutiger Project Cloud</h2>
        <div id="subtituloAba" style="font-weight: bold; color: #4caf50; margin-bottom: 20px;">Pedidos de Peça</div>
        
        <div class="form-group" style="display:flex; gap:10px; margin-bottom:30px; justify-content:center; flex-wrap:wrap;">
            <div id="formInputs" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
            <button class="add-btn" onclick="adicionar()">ADICIONAR</button>
            <input type="text" id="filtroGeral" placeholder="⌕ FILTRAR..." onkeyup="filtrarGeral()" style="padding:10px; border-radius:8px;">
        </div>

        <table id="tabelaDados" style="width:100%; border-collapse:separate; border-spacing:0 10px;">
            <thead id="cabecalhoTabela"></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // Config Firebase (Mantida)
    const firebaseConfig = {
        apiKey: "AiZaSyA4AFbehMGUY0D0-j5hIjLcalhirQYLCN4",
        authDomain: "projeto-frutiger.firebaseapp.com",
        projectId: "projeto-frutiger",
        storageBucket: "projeto-frutiger.firebasestorage.app",
        messagingSenderId: "574572027554",
        appId: "1:574572027554:web:7946825d87e03781f401fb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let abaAtual = 'Pedidos de Peça';
    const configAbas = {
        'Pedidos de Peça': ['DATA', 'CLIENTE', 'O.S.', 'STATUS'],
        'Montados': ['O.S.', 'DATA', 'CLIENTE', 'MONTADOR', 'ENTREGA INTERNA', 'STATUS'],
        'Aprovados': ['DATA', 'CLIENTE', 'O.S.', 'STATUS'],
        'Analisados': ['DATA', 'O.S.', 'CLIENTE', 'ORÇAMENTISTA'],
        'Erros de Apontamento': ['O.S.', 'ERRO', 'QUEM CAUSOU', 'DATA']
    };

    function toggleSubmenu() {
        const sub = document.getElementById('osSubmenu');
        const arrow = document.getElementById('arrow');
        sub.classList.toggle('active');
        arrow.innerText = sub.classList.contains('active') ? '▲' : '▼';
    }

    function navegar(elemento, nomeAba) {
        abaAtual = nomeAba;
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        elemento.classList.add('active');
        document.getElementById('subtituloAba').innerText = nomeAba;
        renderizarInterface();
    }

    function renderizarInterface() {
        const form = document.getElementById('formInputs');
        const head = document.getElementById('cabecalhoTabela');
        form.innerHTML = ''; head.innerHTML = '';
        
        configAbas[abaAtual].forEach(col => {
            if(abaAtual === 'Montados' && col === 'STATUS') return;
            let input = document.createElement('input');
            input.type = (col.includes('DATA') || col.includes('ENTREGA')) ? 'date' : 'text';
            input.id = `in-${col}`;
            input.placeholder = col;
            form.appendChild(input);
            
            let th = document.createElement('th');
            th.innerText = col;
            th.style.textAlign = 'left';
            th.style.padding = '0 15px';
            th.style.fontSize = '0.7rem';
            head.appendChild(th);
        });
        
        let thAcao = document.createElement('th');
        thAcao.innerText = 'AÇÃO';
        head.appendChild(thAcao);
        
        ouvirDadosNuvem();
    }

    function ouvirDadosNuvem() {
        db.collection(abaAtual).orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const tbody = document.querySelector('#tabelaDados tbody');
            tbody.innerHTML = '';
            snapshot.forEach(doc => {
                const item = doc.data();
                let tr = document.createElement('tr');
                configAbas[abaAtual].forEach(col => {
                    let td = document.createElement('td');
                    td.innerText = item[col] || '-';
                    tr.appendChild(td);
                });
                let tdAcao = document.createElement('td');
                tdAcao.innerHTML = `<button onclick="deletar('${doc.id}')" style="background:none; border:1px solid #ff5252; color:#ff5252; cursor:pointer; border-radius:5px;">X</button>`;
                tr.appendChild(tdAcao);
                tbody.appendChild(tr);
            });
        });
    }

    async function adicionar() {
        let novoItem = { timestamp: firebase.firestore.FieldValue.serverTimestamp() };
        configAbas[abaAtual].forEach(col => {
            if(col === 'STATUS' && abaAtual === 'Montados') return;
            const val = document.getElementById(`in-${col}`).value;
            novoItem[col] = val.toUpperCase();
        });
        await db.collection(abaAtual).add(novoItem);
        renderizarInterface();
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        document.body.classList.toggle('dark-mode');
    }

    function toggleFrutiger() {
        document.body.classList.toggle('frutiger-mode');
    }

    async function deletar(id) {
        if(confirm("Excluir?")) await db.collection(abaAtual).doc(id).delete();
    }

    function filtrarGeral() {
        const busca = document.getElementById('filtroGeral').value.toLowerCase();
        document.querySelectorAll('tbody tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(busca) ? '' : 'none';
        });
    }

    renderizarInterface();
</script>
</body>
</html>
