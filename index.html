<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Projeto Frutiger - V 1.1.3</title>
    
    <link rel="icon" href="https://img.icons8.com/emoji/48/leaf-fluttering-in-wind.png" type="image/png">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; height: 100vh; width: 100vw; display: flex;
            overflow: hidden; user-select: none;
        }

        /* TEMAS */
        body.dark-mode { background: #0f0f0f; color: #e0e0e0; }
        body.light-mode { background: #f8f9fa; color: #212529; }

        /* MODO FRUTIGER */
        body.frutiger-mode {
            background-color: #4facfe !important;
            background-image: 
                linear-gradient(135deg, rgba(79, 172, 254, 0.4) 0%, rgba(0, 242, 254, 0.4) 100%), 
                url('https://i.postimg.cc/yDJDBrHk/frutiger-bg.jpg') !important; 
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-size: cover !important; 
            color: #fff !important;
        }

        /* AJUSTE DE FONTES CLARAS NO MODO FRUTIGER */
        body.frutiger-mode .glass-container h2,
        body.frutiger-mode #corpoTabela td,
        body.frutiger-mode #cabecalhoTabela th {
            color: #ffffff !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        body.frutiger-mode #cabecalhoTabela th { opacity: 0.9 !important; }

        /* SIDEBAR */
        .sidebar { 
            width: 70px; height: 100vh; display: flex; flex-direction: column; 
            padding: 25px 0; flex-shrink: 0; z-index: 100; 
            border-right: 1px solid rgba(128,128,128,0.1);
            overflow: hidden; position: absolute; left: 0; top: 0;
            backdrop-filter: blur(15px);
        }
        .sidebar:hover { width: 280px; padding: 25px 15px; }
        
        body.dark-mode .sidebar { background: rgba(20, 20, 20, 0.9); }
        body.light-mode .sidebar { background: rgba(255, 255, 255, 0.9); box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        body.frutiger-mode .sidebar { background: rgba(255, 255, 255, 0.1) !important; border-right: 1px solid rgba(255, 255, 255, 0.2); }

        .sidebar h3, .sidebar .menu-parent, .sidebar .log-container, .sidebar .submenu, .sidebar #themeBtn, .version-text {
            opacity: 0; visibility: hidden; white-space: nowrap; transform: translateX(-15px);
        }
        .sidebar:hover h3, .sidebar:hover .menu-parent, .sidebar:hover .log-container, .sidebar:hover .submenu, .sidebar:hover #themeBtn, .sidebar:hover .version-text {
            opacity: 1; visibility: visible; transform: translateX(0);
        }

        .menu-parent { 
            padding: 14px; border-radius: 12px; background: rgba(76, 175, 80, 0.1); 
            font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            color: #4caf50; margin-bottom: 5px; border: 1px solid rgba(76, 175, 80, 0.2);
        }

        .submenu { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; overflow: hidden; }
        .submenu.active { grid-template-rows: 1fr; }
        .submenu-inner { min-height: 0; }

        .sidebar-item { 
            padding: 12px 15px; font-size: 0.85rem; cursor: pointer; 
            border-bottom: 1px solid rgba(128, 128, 128, 0.08);
        }
        .sidebar-item.active { background: rgba(76, 175, 80, 0.15); color: #4caf50; font-weight: bold; border-left: 4px solid #4caf50; }

        /* ANIMAÇÃO TEMA */
        #themeBtn { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: inherit; transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        #themeBtn.rotate { transform: rotate(360deg) scale(1.2); }

        /* INPUTS ESCURECIDOS */
        input { 
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.3); 
            background: rgba(0, 0, 0, 0.25); color: #fff; outline: none; 
            font-size: 0.9rem; min-width: 140px;
        }
        body.light-mode input { background: rgba(0, 0, 0, 0.05); color: #333; border: 1px solid rgba(0,0,0,0.1); }
        input:focus { border-color: #4caf50; background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 8px rgba(76, 175, 80, 0.3); }
        body.light-mode input:focus { background: #fff; }

        /* CONTEÚDO */
        .main-content { flex-grow: 1; height: 100vh; overflow-y: auto; padding: 30px 20px 30px 100px; display: flex; justify-content: center; }
        .glass-container { width: 100%; max-width: 1200px; border-radius: 24px; padding: 35px; height: fit-content; position: relative; }
        body.dark-mode .glass-container { background: rgba(25,25,25,0.85); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        body.light-mode .glass-container { background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        body.frutiger-mode .glass-container { background: rgba(255, 255, 255, 0.18); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); }

        /* AJUSTE LINHA DIVISÓRIA NAS CÉLULAS */
        #corpoTabela td { border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; }
        body.light-mode #corpoTabela td { border-bottom: 1px solid rgba(0, 0, 0, 0.1); }

        #relogio-container { position: absolute; top: 25px; right: 25px; text-align: right; }
        #relogio { font-size: 1.8rem; font-weight: 700; letter-spacing: -1px; }
        .divider { height: 3px; width: 60px; background: #4caf50; margin: 12px 0 25px 0; border-radius: 10px; }

        .btn-action { background: rgba(128,128,128,0.1); border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; color: inherit; }
        .bubble { position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 50%; pointer-events: none; animation: float linear infinite; z-index: 1; }
        @keyframes float { from { transform: translateY(0); opacity: 0.5; } to { transform: translateY(-110vh); opacity: 0; } }
        
        .log-container { margin-top: auto; margin-bottom: 15px; background: rgba(0,0,0,0.15); border-radius: 12px; padding: 12px; font-size: 0.7rem; }
    </style>
</head>
<body class="dark-mode">

<div id="bubbles-container"></div>

<div class="sidebar">
    <h3 onclick="toggleFrutiger()" style="cursor:pointer; text-align: center; margin-bottom: 30px; letter-spacing: 2px;">FRUTIGER</h3>
    <div style="text-align: center; margin-bottom: 30px;">
        <button id="themeBtn" onclick="toggleTheme()">☾</button>
    </div>
    
    <div class="menu-parent" onclick="toggleSubmenu()">
        <span>Módulos</span>
        <span id="arrow">▼</span>
    </div>
    
    <div id="osSubmenu" class="submenu active">
        <div class="submenu-inner">
            <div class="sidebar-item active" onclick="navegar(this, 'Pedidos de Peça')">Pedidos de Peça</div>
            <div class="sidebar-item" onclick="navegar(this, 'Montados')">Montados</div>
            <div class="sidebar-item" onclick="navegar(this, 'Aprovados')">Aprovados</div>
            <div class="sidebar-item" onclick="navegar(this, 'Analisados')">Analisados</div>
            <div class="sidebar-item" onclick="navegar(this, 'Erros de Apontamento')">Erros de Apontamento</div>
        </div>
    </div>

    <div class="log-container">
        <strong style="color: #4caf50; display: block; margin-bottom: 5px;">HISTORY</strong>
        <b>V 1.1.3</b>: Brighter fonts in Frutiger Mode.<br>
        <b>V 1.1.2</b>: White divider lines in tables.
    </div>
    <div class="version-text" style="text-align: center; opacity: 0.4; font-size: 0.7rem; font-weight: bold;">V 1.1.3</div>
</div>

<div class="main-content">
    <div class="glass-container">
        <div id="relogio-container">
            <div id="relogio">00:00</div>
            <div id="data-atual">--/--/----</div>
        </div>
        <h2 style="margin:0; font-size: 2rem; font-weight: 800; letter-spacing: -1px;">Frutiger Project</h2>
        <div class="divider"></div>
        <div id="subtituloAba" style="font-weight: 700; color: #4caf50; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 25px;">Pedidos de Peça</div>
        
        <div style="display:flex; gap:12px; margin-bottom:30px; justify-content:center; flex-wrap:wrap;">
            <div id="formInputs" style="display:flex; gap:12px; flex-wrap:wrap;"></div>
            <button id="btnAdd" onclick="adicionar()" style="background:#4caf50; color:white; border:none; padding:10px 25px; border-radius:10px; font-weight:bold; cursor:pointer;">ADICIONAR</button>
            <input type="text" id="filtroGeral" placeholder="⌕ PESQUISAR..." onkeyup="filtrarGeral()">
        </div>

        <table style="width:100%; border-collapse:separate; border-spacing:0 0px;">
            <thead id="cabecalhoTabela"></thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AiZaSyA4AFbehMGUY0D0-j5hIjLcalhirQYLCN4",
        authDomain: "projeto-frutiger.firebaseapp.com",
        projectId: "projeto-frutiger",
        storageBucket: "projeto-frutiger.firebasestorage.app",
        messagingSenderId: "574572027554",
        appId: "1:574572027554:web:7946825d87e03781f401fb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let abaAtual = 'Pedidos de Peça';
    const configAbas = {
        'Pedidos de Peça': ['DATA', 'CLIENTE', 'O.S.', 'STATUS'],
        'Montados': ['O.S.', 'DATA', 'CLIENTE', 'MONTADOR', 'ENTREGA INTERNA', 'STATUS'],
        'Aprovados': ['DATA', 'CLIENTE', 'O.S.', 'STATUS'],
        'Analisados': ['DATA', 'O.S.', 'CLIENTE', 'ORÇAMENTISTA'],
        'Erros de Apontamento': ['O.S.', 'ERRO', 'QUEM CAUSOU', 'DATA']
    };

    function atualizarRelogio() {
        const agora = new Date();
        document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(atualizarRelogio, 10000);
    atualizarRelogio();

    function toggleTheme() { 
        const b = document.body;
        const btn = document.getElementById('themeBtn');
        btn.classList.add('rotate');
        setTimeout(() => { btn.classList.remove('rotate'); }, 600);
        if(b.classList.contains('dark-mode')) {
            b.classList.replace('dark-mode', 'light-mode');
            btn.innerText = '☼';
        } else {
            b.classList.replace('light-mode', 'dark-mode');
            btn.innerText = '☾';
        }
    }

    function toggleSubmenu() {
        const sub = document.getElementById('osSubmenu');
        const arrow = document.getElementById('arrow');
        sub.classList.toggle('active');
        arrow.innerText = sub.classList.contains('active') ? '▼' : '▶';
    }

    function navegar(elemento, nomeAba) {
        abaAtual = nomeAba;
        document.querySelectorAll('.sidebar-item').forEach(i => { i.classList.remove('active'); });
        elemento.classList.add('active');
        document.getElementById('subtituloAba').innerText = nomeAba;
        renderizarInterface();
    }

    function renderizarInterface() {
        const form = document.getElementById('formInputs');
        const head = document.getElementById('cabecalhoTabela');
        form.innerHTML = ''; head.innerHTML = '';
        const cols = configAbas[abaAtual];
        
        cols.forEach((col, index) => {
            if(abaAtual === 'Montados' && col === 'STATUS') return;
            let input = document.createElement('input');
            input.type = (col.includes('DATA') || col.includes('ENTREGA')) ? 'date' : 'text';
            input.id = `in-${col}`;
            input.placeholder = col;
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const inputs = Array.from(form.querySelectorAll('input'));
                    const currentIndex = inputs.indexOf(input);
                    if (currentIndex < inputs.length - 1) {
                        inputs[currentIndex + 1].focus();
                    } else {
                        adicionar();
                    }
                }
            });

            form.appendChild(input);
            let th = document.createElement('th');
            th.innerText = col;
            th.style.textAlign = "left"; th.style.padding = "0 15px"; th.style.fontSize = "0.75rem"; th.style.opacity = "0.5";
            head.appendChild(th);
        });
        head.innerHTML += '<th style="text-align:center">AÇÕES</th>';
        
        setTimeout(() => { if(form.firstChild) form.firstChild.focus(); }, 100);
        
        ouvirDadosNuvem();
    }

    function ouvirDadosNuvem() {
        db.collection(abaAtual).orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = '';
            snapshot.forEach(doc => {
                const item = doc.data();
                let tr = document.createElement('tr');
                tr.id = `row-${doc.id}`;
                configAbas[abaAtual].forEach(col => {
                    let td = document.createElement('td');
                    td.setAttribute('data-col', col);
                    let valor = item[col] || '-';
                    td.innerText = (col.includes('DATA') || col.includes('ENTREGA')) ? formatarDataBR(valor) : valor;
                    
                    if(abaAtual === 'Montados' && col === 'STATUS') {
                        if(valor === 'OK') td.style.color = '#4caf50';
                        if(valor === 'ATRASADO') td.style.color = '#ff5252';
                        td.style.fontWeight = 'bold';
                    }

                    tr.appendChild(td);
                });
                let tdAcao = document.createElement('td');
                tdAcao.style.textAlign = "center";
                tdAcao.innerHTML = `<button class="btn-action btn-edit" onclick="toggleEdit('${doc.id}')">✎</button>
                                   <button class="btn-action btn-del" onclick="deletar('${doc.id}')">✕</button>`;
                tr.appendChild(tdAcao);
                tbody.appendChild(tr);
            });
        });
    }

    function formatarDataBR(dataStr) {
        if(!dataStr || !dataStr.includes('-')) return dataStr;
        const [ano, mes, dia] = dataStr.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    async function adicionar() {
        let novoItem = { timestamp: firebase.firestore.FieldValue.serverTimestamp() };
        let hasContent = false;
        configAbas[abaAtual].forEach((col) => {
            if(col === 'STATUS' && abaAtual === 'Montados') return;
            const el = document.getElementById(`in-${col}`);
            novoItem[col] = el.value.toUpperCase();
            if(el.value) hasContent = true;
            el.value = '';
        });
        
        if(!hasContent) return;

        if(abaAtual === 'Montados') {
            const dt = novoItem['DATA'];
            const ent = novoItem['ENTREGA INTERNA'];
            novoItem['STATUS'] = (dt > ent) ? 'ATRASADO' : 'OK';
        }
        
        await db.collection(abaAtual).add(novoItem);
        const firstInput = document.querySelector('#formInputs input');
        if(firstInput) firstInput.focus();
    }

    function toggleEdit(id) {
        const tr = document.getElementById(`row-${id}`);
        const isEditing = tr.classList.toggle('editing');
        const btn = tr.querySelector('.btn-edit');
        if (isEditing) {
            btn.innerText = '✓';
            tr.querySelectorAll('td[data-col]').forEach(td => {
                if(!td.innerText.includes('/') || td.getAttribute('data-col').indexOf('DATA') === -1) { td.contentEditable = true; }
            });
        } else {
            btn.innerText = '✎';
            let updates = {};
            tr.querySelectorAll('td[data-col]').forEach(td => {
                td.contentEditable = false;
                updates[td.getAttribute('data-col')] = td.innerText.toUpperCase();
            });
            db.collection(abaAtual).doc(id).update(updates);
        }
    }

    async function deletar(id) { if(confirm("Remover registro?")) { await db.collection(abaAtual).doc(id).delete(); } }

    function toggleFrutiger() { 
        document.body.classList.toggle('frutiger-mode');
        if(document.body.classList.contains('frutiger-mode')) {
            window.bInterval = setInterval(() => {
                const b = document.createElement('div'); b.className = 'bubble';
                const s = Math.random() * 25 + 10 + 'px'; 
                b.style.width = s; b.style.height = s;
                b.style.left = Math.random() * 100 + 'vw'; b.style.bottom = "-50px";
                b.style.animationDuration = Math.random() * 4 + 4 + 's';
                document.getElementById('bubbles-container').appendChild(b);
                setTimeout(() => { b.remove(); }, 8000);
            }, 500);
        } else { clearInterval(window.bInterval); }
    }

    function filtrarGeral() {
        const busca = document.getElementById('filtroGeral').value.toLowerCase();
        document.querySelectorAll('#corpoTabela tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(busca) ? '' : 'none';
        });
    }

    renderizarInterface();
</script>
</body>
</html>
